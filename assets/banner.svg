<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .grid-cell {
        fill: none;
        stroke: rgba(200, 200, 200, 0.5);
        stroke-width: 1;
      }
    </style>
  </defs>
  
  <!-- 网格线 - 使用单个path确保每条线只画一次 -->
  <!-- 向内偏移0.5px避免边缘被裁剪 -->
  <path class="grid-cell" d="
    M 0.5 0.5 L 0.5 599.5
    M 100 0.5 L 100 599.5
    M 200 0.5 L 200 599.5
    M 300 0.5 L 300 599.5
    M 400 0.5 L 400 599.5
    M 500 0.5 L 500 599.5
    M 600 0.5 L 600 599.5
    M 700 0.5 L 700 599.5
    M 800 0.5 L 800 599.5
    M 900 0.5 L 900 599.5
    M 1000 0.5 L 1000 599.5
    M 1100 0.5 L 1100 599.5
    M 1199.5 0.5 L 1199.5 599.5
    
    M 0.5 0.5 L 1199.5 0.5
    M 0.5 100 L 1199.5 100
    M 0.5 200 L 1199.5 200
    M 0.5 300 L 1199.5 300
    M 0.5 400 L 1199.5 400
    M 0.5 500 L 1199.5 500
    M 0.5 599.5 L 1199.5 599.5
  "/>
</svg>